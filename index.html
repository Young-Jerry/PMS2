<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEPSE Terminal — Portfolio Management</title>
  <meta name="description" content="Professional NEPSE portfolio management terminal with P&L analytics, trade history, and risk analysis.">

  <!-- Design System -->
  <link rel="stylesheet" href="styles/design-system.css">

  <!-- Chart.js + zoom plugin (lightweight, CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    /* Critical above-fold paint — prevents FOUC */
    body { background: #080c14; }
    #pms-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #080c14;
      z-index: 9999;
      gap: 16px;
      transition: opacity 300ms ease;
    }
    #pms-splash.fade { opacity: 0; pointer-events: none; }
    .splash-logo {
      font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
      font-weight: 800; font-size: 22px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #e8eaf0;
    }
    .splash-sub {
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: #4a5568;
    }
    .splash-bar {
      width: 180px; height: 2px;
      background: #141b2d; border-radius: 1px; overflow: hidden;
    }
    .splash-fill {
      height: 100%; background: #3b82f6; border-radius: 1px;
      animation: splashLoad 600ms ease forwards;
    }
    @keyframes splashLoad { from { width: 0 } to { width: 100% } }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div id="pms-splash">
  <div class="splash-logo">NEPSE Terminal</div>
  <div class="splash-sub">Portfolio Management System</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- App Shell -->
<div id="pms-app">
  <!-- Sidebar -->
  <aside id="pms-sidebar"></aside>

  <!-- Main Area -->
  <div id="pms-main">
    <!-- Topbar -->
    <header id="pms-topbar"></header>

    <!-- View Container -->
    <main id="pms-view" role="main"></main>
  </div>
</div>

<!-- ═══════════ Core Financial Engine ═══════════ -->
<!-- CRITICAL: Load order matters. trade-math → capital → state → ui → views → app -->
<script src="core/trade-math.js"></script>
<script src="core/capital.js"></script>
<script src="core/state.js"></script>

<!-- ═══════════ UI Utilities ═══════════ -->
<script src="ui/utils.js"></script>

<!-- ═══════════ Views ═══════════ -->
<script src="views/dashboard.js"></script>
<script src="views/portfolio.js"></script>
<script src="views/trades.js"></script>
<script src="views/analytics.js"></script>
<script src="views/risk.js"></script>
<script src="views/cashflow.js"></script>
<script src="views/calculator.js"></script>
<script src="views/settings.js"></script>

<!-- ═══════════ SPA Router ═══════════ -->
<script src="app.js"></script>

<!-- Splash dismiss -->
<script>
  window.addEventListener('load', () => {
    const splash = document.getElementById('pms-splash');
    setTimeout(() => {
      splash.classList.add('fade');
      setTimeout(() => splash.remove(), 320);
    }, 500);
  });
</script>

</body>
</html>
